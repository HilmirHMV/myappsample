<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bike Dash</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bike Dash">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            font-family: monospace;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        canvas {
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 3px solid #333;
        }
        #game3d {
            position: fixed;
            top: 0;
            left: 0;
        }
        #game3d.hidden, #game.hidden { display: none; }
        #hud3d {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 10px);
            left: 0;
            width: 100%;
            text-align: center;
            color: #fff;
            font-family: monospace;
            font-size: 15px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            z-index: 5;
        }
        #hud3d.hidden { display: none; }
        #ui-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        #ui-overlay.hidden { display: none; }
        #ui-overlay h1 { font-size: 28px; color: #ff6644; margin-bottom: 12px; text-shadow: 2px 2px #000; }
        #ui-overlay p { font-size: 14px; color: #aaa; margin: 6px 0; }
        #ui-overlay .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <canvas id="game3d" class="hidden"></canvas>
    <div id="hud3d" class="hidden"></div>
    <div id="ui-overlay" class="hidden"></div>
    <script src="game.js"></script>
    <script src="bike.js"></script>
    <script src="bike3d.js"></script>
    <script>gameLoop();</script>
</body>
</html>
